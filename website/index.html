<!DOCTYPE html>
<html>
<head>
    <title>Test SPA - Hash Routing</title>
    <style>
        body { font-family: Arial; padding: 20px; }
        .route { color: blue; font-weight: bold; }
    </style>
</head>
<body>
    <h1>Test SPA Application</h1>
    <p>Current route: <span class="route" id="route"></span></p>
    <nav>
        <a href="#/">Home</a> |
        <a href="#/callback">Callback</a> |
        <a href="#/users">Users</a> |
        <a href="#/logs">Logs</a>
    </nav>
    <div id="content"></div>
    <script>
        const routes = {
            '/': '<h2>Home Page</h2><p>Welcome to the home page</p>',
            '/callback': '<h2>Callback Page</h2><p>OKTA callback would be processed here</p>',
            '/users': '<h2>Users Page</h2><p>List of users would appear here</p>',
            '/logs': '<h2>Logs Page</h2><p>Application logs would appear here</p>'
        };

        function router() {
            const hash = window.location.hash.slice(1) || '/';
            document.getElementById('route').textContent = hash;
            document.getElementById('content').innerHTML = routes[hash] || '<h2>404</h2><p>Route not found</p>';
        }

        window.addEventListener('hashchange', router);
        router();
    </script>
</body>
</html>
